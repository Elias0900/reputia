<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement annulé — Réputia</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0e0c; --ink2: #3d3b35; --ink3: #7a7770;
    --paper: #faf8f4; --paper2: #f0ede6; --paper3: #e5e0d6;
    --accent: #2a6e4e; --accent2: #1d5038;
    --gold-light: #fdf5e6; --gold: #c4922a;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }
  body {
    font-family: var(--font-body);
    background: var(--paper); color: var(--ink);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 2rem; text-align: center;
  }
  .logo { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 3rem; }
  .logo span { color: var(--accent); }
  .icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--gold-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; margin: 0 auto 1.5rem;
  }
  h1 { font-family: var(--font-display); font-size: 2rem; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
  p { color: var(--ink2); font-size: 1rem; max-width: 400px; margin: 0 auto 1.5rem; line-height: 1.7; }
  .reassure {
    background: var(--gold-light); border: 1px solid #e8d5a3;
    border-radius: 10px; padding: 1rem 1.5rem;
    font-size: 0.875rem; color: #7a5c0a;
    max-width: 400px; margin: 0 auto 2rem; line-height: 1.6;
  }
  .btn {
    display: inline-block; background: var(--accent); color: #fff;
    padding: 13px 28px; border-radius: 8px;
    font-size: 0.95rem; font-weight: 500; text-decoration: none;
    transition: background 0.2s; margin-right: 10px;
  }
  .btn:hover { background: var(--accent2); }
  .btn-ghost {
    display: inline-block; border: 1.5px solid var(--paper3);
    color: var(--ink2); padding: 12px 24px; border-radius: 8px;
    font-size: 0.95rem; text-decoration: none; transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--ink2); color: var(--ink); }
</style>
</head>
<body>
  <div class="logo">Réput<span>ia</span></div>
  <div class="icon">↩</div>
  <h1>Paiement annulé</h1>
  <p>Aucun montant n'a été débité. Vous pouvez reprendre quand vous voulez.</p>
  <div class="reassure">
    💡 Rappel : l'offre Pro inclut <strong>14 jours d'essai gratuit</strong>. Vous ne serez débité qu'après cette période, et vous pouvez annuler à tout moment.
  </div>
  <div>
    <a href="/#pricing" class="btn">Réessayer →</a>
    <a href="/" class="btn-ghost">Retour à l'accueil</a>
  </div>
</body>
</html>
