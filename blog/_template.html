<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — Réputia</title>
<meta name="description" content="{{META_DESC}}">
<meta name="keywords" content="{{KEYWORDS}}">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{META_DESC}}">
<meta property="og:type" content="article">
<meta property="og:url" content="https://reputia.fr/blog/{{SLUG}}">
<link rel="canonical" href="https://reputia.fr/blog/{{SLUG}}">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{TITLE}}",
  "description": "{{META_DESC}}",
  "author": { "@type": "Organization", "name": "Réputia" },
  "publisher": { "@type": "Organization", "name": "Réputia", "url": "https://reputia.fr" },
  "datePublished": "{{DATE}}",
  "url": "https://reputia.fr/blog/{{SLUG}}"
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0e0c; --ink2: #3d3b35; --ink3: #7a7770;
    --paper: #faf8f4; --paper2: #f0ede6; --paper3: #e5e0d6;
    --accent: #2a6e4e; --accent2: #1d5038; --accent-light: #e8f3ed;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }
  body { font-family: var(--font-body); background: var(--paper); color: var(--ink); line-height: 1.7; }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,248,244,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--paper3);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  .logo { font-family: var(--font-display); font-size: 1.4rem; color: var(--ink); text-decoration: none; }
  .logo span { color: var(--accent); }
  .btn-nav { background: var(--accent); color: #fff; padding: 8px 18px; border-radius: 6px; font-size: 0.875rem; font-weight: 500; text-decoration: none; }
  .btn-nav:hover { background: var(--accent2); }
  .article-wrap { max-width: 720px; margin: 0 auto; padding: 4rem 2rem 6rem; }
  .breadcrumb { font-size: 0.8rem; color: var(--ink3); margin-bottom: 2rem; }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .article-cat { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
  h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.6rem); letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 1.25rem; }
  .article-meta { display: flex; gap: 1rem; font-size: 0.82rem; color: var(--ink3); margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--paper3); flex-wrap: wrap; }
  .article-body h2 { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: -0.02em; margin: 2.5rem 0 1rem; color: var(--ink); }
  .article-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1.75rem 0 0.75rem; color: var(--ink); }
  .article-body p { font-size: 1rem; color: var(--ink2); margin-bottom: 1.25rem; line-height: 1.75; }
  .article-body ul, .article-body ol { margin: 0 0 1.25rem 1.5rem; color: var(--ink2); font-size: 1rem; }
  .article-body li { margin-bottom: 0.5rem; line-height: 1.65; }
  .article-body strong { color: var(--ink); font-weight: 600; }
  .article-body a { color: var(--accent); }
  .highlight-box {
    background: var(--accent-light); border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0; padding: 1rem 1.25rem; margin: 1.5rem 0;
    font-size: 0.95rem; color: var(--accent2); line-height: 1.65;
  }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
  .stat-card { background: var(--paper2); border-radius: 10px; padding: 1rem; text-align: center; }
  .stat-card .num { font-family: var(--font-display); font-size: 2rem; color: var(--ink); }
  .stat-card .lbl { font-size: 0.78rem; color: var(--ink3); margin-top: 4px; }
  .cta-box {
    background: var(--ink); color: var(--paper);
    border-radius: 14px; padding: 2rem; margin: 3rem 0; text-align: center;
  }
  .cta-box h3 { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 0.75rem; }
  .cta-box p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .cta-box a { background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 500; font-size: 0.95rem; }
  .cta-box a:hover { background: var(--accent2); }
  .related { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--paper3); }
  .related h3 { font-size: 1rem; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
  .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
  .related-card { background: var(--paper2); border-radius: 10px; padding: 1rem; text-decoration: none; color: var(--ink); transition: background 0.15s; }
  .related-card:hover { background: var(--paper3); }
  .related-card .cat { font-size: 0.72rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .related-card .title { font-size: 0.9rem; font-weight: 500; line-height: 1.4; }
  footer { background: var(--ink); color: rgba(255,255,255,0.5); text-align: center; padding: 2rem; font-size: 0.8rem; }
  footer a { color: rgba(255,255,255,0.7); text-decoration: none; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Réput<span>ia</span></a>
  <a href="/#pricing" class="btn-nav">Essai gratuit</a>
</nav>
{{CONTENT}}
<footer>
  <p>© 2026 Réputia · <a href="/">Accueil</a> · <a href="/blog">Blog</a> · <a href="mailto:contact@reputia.fr">Contact</a></p>
</footer>
</body>
</html>
