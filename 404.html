<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Réputia</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0e0c; --ink2: #3d3b35; --ink3: #7a7770;
    --paper: #faf8f4; --paper3: #e5e0d6;
    --accent: #2a6e4e;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }
  body {
    font-family: var(--font-body);
    background: var(--paper); color: var(--ink);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  .logo { font-family: var(--font-display); font-size: 1.5rem; color: var(--ink); margin-bottom: 3rem; }
  .logo span { color: var(--accent); }
  h1 { font-family: var(--font-display); font-size: 5rem; color: var(--paper3); line-height: 1; margin-bottom: 1rem; }
  h2 { font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 0.75rem; }
  p { color: var(--ink2); font-size: 0.95rem; margin-bottom: 2rem; }
  a {
    background: var(--accent); color: #fff;
    padding: 12px 24px; border-radius: 8px;
    text-decoration: none; font-size: 0.9rem; font-weight: 500;
  }
  a:hover { background: #1d5038; }
</style>
</head>
<body>
  <div class="logo">Réput<span>ia</span></div>
  <h1>404</h1>
  <h2>Page introuvable</h2>
  <p>Cette page n'existe pas ou a été déplacée.</p>
  <a href="/">← Retour à l'accueil</a>
</body>
</html>
